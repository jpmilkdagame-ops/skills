apiVersion: v1
kind: ConfigMap
metadata:
  name: omega-platform-config
  namespace: OMEGA_NAMESPACE
data:
  OMEGA_NAMESPACE: OMEGA_NAMESPACE
  KAFKA_BOOTSTRAP_SERVERS: omega-kafka-bootstrap:9092
  REDIS_URL: redis://omega-redis:6379/0
  QDRANT_URL: http://omega-qdrant:6333
---
apiVersion: v1
kind: Secret
metadata:
  name: omega-platform-secrets
  namespace: OMEGA_NAMESPACE
type: Opaque
stringData:
  DATABASE_URL: postgresql://omega:change-me@omega-postgres:5432/omega
