apiVersion: apps/v1
kind: Deployment
metadata:
  name: omega-core-gateway
  namespace: OMEGA_NAMESPACE
spec:
  replicas: 2
  selector:
    matchLabels:
      app: omega-core-gateway
  template:
    metadata:
      labels:
        app: omega-core-gateway
    spec:
      containers:
        - name: core-gateway
          image: omega/core-gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: omega-platform-config
            - secretRef:
                name: omega-platform-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: omega-core-gateway
  namespace: OMEGA_NAMESPACE
spec:
  selector:
    app: omega-core-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8000
