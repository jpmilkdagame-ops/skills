<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Omega Control Center</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      body { margin: 0; background: #060914; color: #e5ecff; }
      header { padding: 24px; border-bottom: 1px solid #1d2744; background: #0b1020; }
      main { display: grid; gap: 16px; grid-template-columns: 1.2fr 1fr; padding: 24px; }
      section { border: 1px solid #1d2744; border-radius: 16px; background: #0b1020; padding: 16px; box-shadow: 0 16px 48px #0006; }
      .nodes { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
      .node, .step { border: 1px solid #28406d; border-radius: 12px; padding: 12px; background: #101a33; }
      .ok { color: #72f1b8; }
      .warn { color: #ffd166; }
      pre { white-space: pre-wrap; overflow-wrap: anywhere; color: #b8c7ff; }
    </style>
  </head>
  <body>
    <header>
      <h1>Omega Control Center</h1>
      <p>Live node status, DAG routing, memory writes, and trace output for the local Omega runtime.</p>
    </header>
    <main>
      <section>
        <h2>Node Fleet</h2>
        <div id="nodes" class="nodes"></div>
      </section>
      <section>
        <h2>DAG Execution</h2>
        <div id="dag"></div>
      </section>
      <section>
        <h2>Recent Event</h2>
        <pre id="event"></pre>
      </section>
      <section>
        <h2>Operator Actions</h2>
        <button id="simulate">Simulate task.request</button>
        <p id="status" class="ok">dashboard ready</p>
      </section>
    </main>
    <script type="module" src="./src/dashboard.js"></script>
  </body>
</html>
